name: Testler

# Yalnız herkese açık depoda (main dalı) çalışır.
#
# Neden master YOK: özel geliştirme deposu master dalında ve tam test
# takımı (531) bare CI runner'da geçemez - kimlik, kasa, hafıza gibi
# kişisel kurulum orada yok. master'da tetiklenince her push bir CI
# hatası maili üretiyordu. CI, dış kullanıcının aldığı public artefaktı
# (main, taze kurulum: 142) doğrular; kişisel çalışma deposunu değil.

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - name: Depoyu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Bağımlılıklar
        run: pip install cryptography

      - name: Test takımı
        shell: bash
        run: bash plugins/enver-framework/scripts/testler/tumunu-calistir.sh
